%YAML:1.0

# ── File paths ────────────────────────────────────────────────────────────────
save_pcd_path:  $(find point_cloud_projection)/PCD/Color.pcd
map_pcd_path:   $(find point_cloud_projection)/PCD/GlobalMap.pcd
keep_uncolored_points: 0

# ── Topics ────────────────────────────────────────────────────────────────────
# NOTE: /right and /left image topics are not present in the recorded bag.
#       Using /forwardRight and /forwardLeft which have both image and camera_info.
image_topic_right: /forwardRight/image_raw/compressed
image_topic_left:  /forwardLeft/image_raw/compressed
output_topic:      /colorised_points
pointcloud_topic:  /ouster/points
calibration_path: $(find point_cloud_projection)/configs/calibration.yaml
# true  = use hardcoded values from configs/calibration.yaml
# false = look up extrinsics from TF tree at runtime
use_calibration_file: true
imu_topic:  /ms/imu/data
imu_frame:  imu_link
odom_topic: /lio_sam/mapping/odometry
base_frame: "base_link"

# ── CameraInfo topics (intrinsics + distortion sourced from here at runtime) ──
camera_info_topic_right: /forwardRight/camera_info
camera_info_topic_left:  /forwardLeft/camera_info

# ── TF frame IDs (extrinsics looked up via tf2 at runtime) ───────────────────
# lidar_frame must match the frame_id broadcast in /tf or /tf_static
lidar_frame: os_sensor
# camera frames are read automatically from the CameraInfo header.frame_id,
# so no need to specify them here.

# ── Output settings ───────────────────────────────────────────────────────────
min_color_frames: 3
max_lidar_z: 100        # metres, maximum Z value for lidar points to be coloured

# ── Synchronisation parameters ────────────────────────────────────────────────
max_time_offset:       0.05    # seconds
initial_startup_delay: 0.1     # seconds

# ── REMOVED (now sourced at runtime) ─────────────────────────────────────────
# distortion_coeffs_right / left   -> /forwardRight/camera_info  D[]
# distortion_model_right / left    -> /forwardRight/camera_info  distortion_model
# intrinsics_right / left          -> /forwardRight/camera_info  K[]
# resolution_right / left          -> /forwardRight/camera_info  width / height
# T_lidar_camera_right / left      -> tf2 lookup: os_sensor -> camera frame